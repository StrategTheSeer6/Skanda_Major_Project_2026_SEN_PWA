<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" type="application/json" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon-192.png') }}" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <title>SEN - Start Course</title>
    
</head>
<body>
    <!-- This always appears at the top of every page. -->
    <div class="toolbar">
        <a href="/loggedinhomepage"><div class="toolbar_button">Home</div></a>
        <h1>SEN - Start Course</h1>
        <a href="{% if loggedin %}/logout{% else %}/login{% endif %}"><div class="toolbar_button" id="login_button">{% if loggedin %}Log Out{% else %}Log In{% endif %}</div></a>
    </div>
    

    <div class="container">
        <h1>Get Ready...</h1>
        <p>
            {% if subtopic %}
            You are about to start a test on {{ subtopic }}
            {% else %}
            You will be starting the Demo Test now, good luck!
            {% endif %}
        </p>
        <form action="/start_test" method="post">
            <input type="hidden" id="subtopic" name="subtopic" value="{% if subtopic %}{{ subtopic }}{% else %}sd phases{% endif %}">
            <button type="submit">Continue</button>
        </form>

    </div>

</body>
</html>
